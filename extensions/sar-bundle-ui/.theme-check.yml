# Extension theme SAR Bundle — à côté de shopify.extension.toml
# Le CLI exécute Theme Check en mode strict sur le JS du bloc ; sans cela,
# `shopify app dev` échoue si bundle-builder.js > 10 Ko (recommandation perf Shopify).
AssetSizeAppBlockJavaScript:
  enabled: false

AssetSizeAppBlockCSS:
  enabled: false
