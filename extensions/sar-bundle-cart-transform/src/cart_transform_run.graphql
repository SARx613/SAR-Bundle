query CartTransformRunInput {
  cart {
    lines {
      id
      quantity
      parentRelationship {
        parent {
          id
        }
      }
      sarBundleId: attribute(key: "_sar_bundle_id") {
        value
      }
      sarParentVariantId: attribute(key: "_sar_parent_variant_id") {
        value
      }
      sarBundleTitle: attribute(key: "_sar_bundle_title") {
        value
      }
      sarBundleImage: attribute(key: "_sar_bundle_image") {
        value
      }
      sarBundleBreakdown: attribute(key: "_sar_bundle_breakdown") {
        value
      }
      merchandise {
        __typename
        ... on ProductVariant {
          title
          product {
            title
          }
        }
      }
    }
  }
}
