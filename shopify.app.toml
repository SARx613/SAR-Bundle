# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "35892f24b2856f9d3de4914a939f8a98"
name = "SAR Bundle"
application_url = "https://sar-bundle.onrender.com"
embedded = true

[build]
# Évite d’écraser App URL / App Proxy avec un tunnel trycloudflare quand tu lances `shopify app dev` en local.
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "products/update" ]
  uri = "/webhooks/products/update"

  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  uri = "/webhooks/compliance"


[access_scopes]
# Aligner avec la variable SCOPES sur l’hébergement si elle est définie.
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products,write_files,read_files,read_orders"

[auth]
redirect_urls = ["https://sar-bundle.onrender.com/auth/callback"]

[app_proxy]
url = "https://sar-bundle.onrender.com/apps/sar-bundle"
subpath = "sar-bundle"
prefix = "apps"
