on: [push, pull_request]

name: CI

jobs:
  CI:
    name: CI_Node_${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: [20.19.0, 22, 24]
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sar_bundle_ci
        options: >-
          --health-cmd "pg_isready -U postgres -d sar_bundle_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sar_bundle_ci
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: ${{ matrix.version }}
      - name: Install
        run: npm ci
      - name: Prisma migrate (PostgreSQL)
        run: npx prisma migrate deploy
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Build
        run: npm run build
